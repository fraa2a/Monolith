name: Release on Version Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and release Monolith
    runs-on: windows-latest

    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      VCPKG_EXE: ${{ github.workspace }}\vcpkg\vcpkg.exe
      FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
      USERNAME: ${{ github.repository_owner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart("v")
          # Accept X.Y.Z (stable) or X.Y.Z-rcN / -betaN etc. (pre-release).
          if ($ver -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.]+)?$') {
            Write-Error "Tag must look like vX.Y.Z or vX.Y.Z-rcN, got: $tag"
            exit 1
          }
          $isPre = if ($ver -match '-') { "true" } else { "false" }
          # Inno Setup's AppVersion wants a plain numeric X.Y.Z; strip any suffix.
          $numeric = ($ver -split '-')[0]
          "version=$ver" >> $env:GITHUB_OUTPUT
          "numeric=$numeric" >> $env:GITHUB_OUTPUT
          "prerelease=$isPre" >> $env:GITHUB_OUTPUT

      # Pinned to the builtin-baseline commit in vcpkg.json so dependency
      # versions (FFmpeg DLL ABIs etc.) are reproducible across CI runs.
      - name: Clone vcpkg (pinned)
        shell: pwsh
        run: |
          $sha = (Get-Content vcpkg.json | ConvertFrom-Json).'builtin-baseline'
          git init "$env:VCPKG_ROOT"
          git -C "$env:VCPKG_ROOT" remote add origin https://github.com/microsoft/vcpkg.git
          git -C "$env:VCPKG_ROOT" fetch --depth 1 origin $sha
          git -C "$env:VCPKG_ROOT" checkout FETCH_HEAD

      - name: Bootstrap vcpkg
        shell: pwsh
        run: '& "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics'

      - name: Configure vcpkg binary cache
        shell: pwsh
        run: |
          "VCPKG_BINARY_SOURCES=clear;nuget,$env:FEED_URL,readwrite" >> $env:GITHUB_ENV
          $nuget = (& "$env:VCPKG_EXE" fetch nuget | Select-Object -Last 1)
          & $nuget sources remove -Name GitHubPackages -NonInteractive 2>$null
          & $nuget sources add `
            -Source "$env:FEED_URL" `
            -StorePasswordInClearText `
            -Name GitHubPackages `
            -UserName "$env:USERNAME" `
            -Password "${{ secrets.GITHUB_TOKEN }}" `
            -NonInteractive
          & $nuget setapikey "${{ secrets.GITHUB_TOKEN }}" -Source "$env:FEED_URL" -NonInteractive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build (Tauri UI)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/desktop-ui/src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            app/desktop-ui/package-lock.json
            plugins/stream-deck/package-lock.json

      - name: Ensure Visual Studio Build Tools
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = if (Test-Path $vswhere) {
            & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          }
          if ([string]::IsNullOrWhiteSpace($vs)) {
            choco install visualstudio2022buildtools --no-progress -y --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --passive --norestart"
          }

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Ensure Ninja
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja --no-progress -y
          }

      - name: Locate mt.exe (manifest tool)
        shell: pwsh
        run: |
          $mt = Get-ChildItem "$env:VCINSTALLDIR\..\..\..\..\..\Windows Kits\*\bin\*\x64\mt.exe" `
                 -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $mt) {
            $mt = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\*\bin\*\x64\mt.exe" `
                   -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $mt) {
            $mt = Get-ChildItem "$env:ProgramFiles\*\bin\*\x64\mt.exe" `
                   -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($mt) {
            "CMAKE_MT=$($mt.FullName)" >> $env:GITHUB_ENV
            Write-Host "Found mt.exe at $($mt.FullName)"
          } else {
            Write-Warning "mt.exe not found -- manifest will be broken!"
          }

      - name: Configure
        shell: pwsh
        env:
          MONOLITH_VERSION: ${{ steps.version.outputs.numeric }}
        run: |
          cmake -S . -B build `
            -G "Ninja Multi-Config" `
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            "-DMONOLITH_VERSION=$env:MONOLITH_VERSION" `
            "-DCMAKE_MT:FILEPATH=$env:CMAKE_MT"

      # The CMake desktop_ui target bundles the Preact frontend (npm/Vite) and
      # compiles the Tauri UI (cargo) into <recorder-output>/ui/Monolith.UI.exe.
      - name: Build Release
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Install Stream Deck plugin dependencies
        shell: pwsh
        working-directory: plugins/stream-deck
        run: npm ci

      - name: Build Stream Deck plugin package
        shell: pwsh
        working-directory: plugins/stream-deck
        run: .\scripts\package-plugin.ps1 -Version "${{ steps.version.outputs.numeric }}"

      - name: Verify build output
        shell: pwsh
        run: |
          foreach ($f in @(
            "build/app/recorder/Release/Monolith.exe",
            "build/app/recorder/Release/ui/Monolith.UI.exe",
            "build/app/recorder/Release/WinSparkle.dll",
            "build/app/recorder/Release/sqlite3.dll",
            "plugins/stream-deck/dist/Monolith-StreamDeck-${{ steps.version.outputs.numeric }}.streamDeckPlugin"
          )) {
            if (-not (Test-Path $f)) {
              Write-Error "Build output not found: $f"
              exit 1
            }
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $num = "${{ steps.version.outputs.numeric }}"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMonolithVersion=$num /DMonolithFullVersion=$ver installer\monolith.iss
          if (-not (Test-Path "installer/Output/MonolithSetup-$ver.exe")) {
            Write-Error "Installer was not produced"
            exit 1
          }

      - name: Sign installer and generate appcast
        if: steps.version.outputs.prerelease != 'true'
        shell: pwsh
        env:
          WINSPARKLE_ED_PRIVATE_KEY: ${{ secrets.WINSPARKLE_ED_PRIVATE_KEY }}
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          ./scripts/generate-appcast.ps1 `
            -Version $ver `
            -InstallerPath "installer/Output/MonolithSetup-$ver.exe" `
            -InstallerUrl "https://github.com/${{ github.repository }}/releases/download/v$ver/MonolithSetup-$ver.exe" `
            -ReleaseNotesUrl "https://github.com/${{ github.repository }}/releases/tag/v$ver" `
            -PrivateKeyPem $env:WINSPARKLE_ED_PRIVATE_KEY `
            -OutputPath appcast.xml

      - name: Create source archive
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          git archive --format=zip --output "monolith-src-$ver.zip" HEAD

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Monolith ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          make_latest: ${{ steps.version.outputs.prerelease != 'true' }}
          fail_on_unmatched_files: false
          files: |
            installer/Output/MonolithSetup-*.exe
            appcast.xml
            monolith-src-*.zip
            plugins/stream-deck/dist/*.streamDeckPlugin
          body: |
            Monolith ${{ steps.version.outputs.version }}

            **Install:** download and run `MonolithSetup-${{ steps.version.outputs.version }}.exe` (per-user, no admin needed, no prerequisites).
            Existing installs update automatically via the in-app updater.

            **Stream Deck:** `Monolith-StreamDeck-${{ steps.version.outputs.version }}.streamDeckPlugin`

            **Source:** `monolith-src-${{ steps.version.outputs.version }}.zip` (GPLv3 corresponding source).
