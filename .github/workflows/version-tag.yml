name: Release on Version Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release Monolith
    runs-on: windows-latest

    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      RELEASE_ASSET_PATH: build/app/recorder/Release/Monolith.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone vcpkg
        shell: pwsh
        run: git clone --depth 1 https://github.com/microsoft/vcpkg.git "$env:VCPKG_ROOT"

      - name: Bootstrap vcpkg
        shell: pwsh
        run: '& "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics'

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Build Release
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Verify release asset
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:RELEASE_ASSET_PATH")) {
            Write-Error "Release asset not found: $env:RELEASE_ASSET_PATH"
            exit 1
          }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: ${{ env.RELEASE_ASSET_PATH }}
          body: |
            New Monolith version released.

            Included in this release:
            - Windows executable attached to this release

            Notes:
            - This changelog is intentionally minimal for now.
            - The attached asset will be switched to the installer `.exe` once packaging is ready.
