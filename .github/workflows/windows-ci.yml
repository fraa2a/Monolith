name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build Monolith for Windows
    runs-on: windows-latest

    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone vcpkg
        shell: pwsh
        run: git clone --depth 1 https://github.com/microsoft/vcpkg.git "$env:VCPKG_ROOT"

      - name: Bootstrap vcpkg
        shell: pwsh
        run: '& "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

      # The CMake settings_app target runs `dotnet publish` for the WinUI
      # settings sidecar into the recorder output directory.
      - name: Build Release
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path "build/app/recorder/Release/Monolith.exe")) {
            Write-Error "Build output not found: build/app/recorder/Release/Monolith.exe"
            exit 1
          }
          if (-not (Test-Path "build/app/recorder/Release/Monolith.Settings.exe")) {
            Write-Error "Build output not found: build/app/recorder/Release/Monolith.Settings.exe"
            exit 1
          }

      - name: Upload release folder
        uses: actions/upload-artifact@v4
        with:
          name: monolith-windows-release
          path: build/app/recorder/Release/**
          if-no-files-found: error
