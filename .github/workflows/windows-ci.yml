name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build Monolith for Windows
    runs-on: windows-latest

    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pinned to the builtin-baseline commit in vcpkg.json so dependency
      # versions (FFmpeg DLL ABIs etc.) are reproducible across CI runs.
      - name: Clone vcpkg (pinned)
        shell: pwsh
        run: |
          $sha = (Get-Content vcpkg.json | ConvertFrom-Json).'builtin-baseline'
          git init "$env:VCPKG_ROOT"
          git -C "$env:VCPKG_ROOT" remote add origin https://github.com/microsoft/vcpkg.git
          git -C "$env:VCPKG_ROOT" fetch --depth 1 origin $sha
          git -C "$env:VCPKG_ROOT" checkout FETCH_HEAD

      - name: Bootstrap vcpkg
        shell: pwsh
        run: '& "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugins/stream-deck/package-lock.json

      - name: Ensure Visual Studio Build Tools
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = if (Test-Path $vswhere) {
            & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          }
          if ([string]::IsNullOrWhiteSpace($vs)) {
            choco install visualstudio2022buildtools --no-progress -y --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --passive --norestart"
          }

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"

      # The CMake settings_app target runs `dotnet publish` for the WinUI
      # settings sidecar into the recorder output directory.
      - name: Build Release
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Install Stream Deck plugin dependencies
        shell: pwsh
        working-directory: plugins/stream-deck
        run: npm ci

      - name: Build Stream Deck plugin package
        shell: pwsh
        working-directory: plugins/stream-deck
        run: .\scripts\package-plugin.ps1

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path "build/app/recorder/Release/Monolith.exe")) {
            Write-Error "Build output not found: build/app/recorder/Release/Monolith.exe"
            exit 1
          }
          if (-not (Test-Path "build/app/recorder/Release/settings/Monolith.Settings.exe")) {
            Write-Error "Build output not found: build/app/recorder/Release/settings/Monolith.Settings.exe"
            exit 1
          }
          $forbidden = Get-ChildItem "build/app/recorder/Release/settings" -Recurse -File |
            Where-Object { $_.Name -match '^(Microsoft\.Windows\.AI\.|onnxruntime|DirectML|Microsoft\.Windows\.Widgets|Microsoft\.Windows\.Workloads|NPU)' }
          if ($forbidden) {
            Write-Error "Unexpected AI/ML/Widgets files in Settings bundle: $($forbidden.Name -join ', ')"
            exit 1
          }
          $plugin = Get-ChildItem "plugins/stream-deck/dist/*.streamDeckPlugin" -ErrorAction SilentlyContinue
          if (-not $plugin) {
            Write-Error "Stream Deck package not found under plugins/stream-deck/dist"
            exit 1
          }

      - name: Upload release folder
        uses: actions/upload-artifact@v4
        with:
          name: monolith-windows-release
          path: |
            build/app/recorder/Release/**
            plugins/stream-deck/dist/*.streamDeckPlugin
          if-no-files-found: error
