name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Monolith for Windows
    runs-on: windows-latest

    env:
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg
      VCPKG_EXE: ${{ github.workspace }}\vcpkg\vcpkg.exe
      FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
      USERNAME: ${{ github.repository_owner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pinned to the builtin-baseline commit in vcpkg.json so dependency
      # versions (FFmpeg DLL ABIs etc.) are reproducible across CI runs.
      - name: Clone vcpkg (pinned)
        shell: pwsh
        run: |
          $sha = (Get-Content vcpkg.json | ConvertFrom-Json).'builtin-baseline'
          git init "$env:VCPKG_ROOT"
          git -C "$env:VCPKG_ROOT" remote add origin https://github.com/microsoft/vcpkg.git
          git -C "$env:VCPKG_ROOT" fetch --depth 1 origin $sha
          git -C "$env:VCPKG_ROOT" checkout FETCH_HEAD

      - name: Bootstrap vcpkg
        shell: pwsh
        run: '& "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics'

      - name: Configure vcpkg binary cache
        shell: pwsh
        run: |
          $cacheMode = if ("${{ github.event_name }}" -eq "pull_request") { "read" } else { "readwrite" }
          "VCPKG_BINARY_SOURCES=clear;nuget,$env:FEED_URL,$cacheMode" >> $env:GITHUB_ENV
          $nuget = (& "$env:VCPKG_EXE" fetch nuget | Select-Object -Last 1)
          & $nuget sources remove -Name GitHubPackages -NonInteractive 2>$null
          & $nuget sources add `
            -Source "$env:FEED_URL" `
            -StorePasswordInClearText `
            -Name GitHubPackages `
            -UserName "$env:USERNAME" `
            -Password "${{ secrets.GITHUB_TOKEN }}" `
            -NonInteractive
          if ($cacheMode -eq "readwrite") {
            & $nuget setapikey "${{ secrets.GITHUB_TOKEN }}" -Source "$env:FEED_URL" -NonInteractive
          }

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build (Tauri UI)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/desktop-ui/src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugins/stream-deck/package-lock.json

      - name: Ensure Visual Studio Build Tools
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = if (Test-Path $vswhere) {
            & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          }
          if ([string]::IsNullOrWhiteSpace($vs)) {
            choco install visualstudio2022buildtools --no-progress -y --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --passive --norestart"
          }

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Ensure Ninja
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja --no-progress -y
          }

      - name: Locate mt.exe (manifest tool)
        shell: pwsh
        run: |
          $mt = Get-ChildItem "$env:VCINSTALLDIR\..\..\..\..\..\Windows Kits\*\bin\*\x64\mt.exe" `
                 -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $mt) {
            $mt = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\*\bin\*\x64\mt.exe" `
                   -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $mt) {
            $mt = Get-ChildItem "$env:ProgramFiles\*\bin\*\x64\mt.exe" `
                   -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($mt) {
            "CMAKE_MT=$($mt.FullName)" >> $env:GITHUB_ENV
            Write-Host "Found mt.exe at $($mt.FullName)"
          } else {
            Write-Warning "mt.exe not found -- manifest will be broken!"
          }

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build
          -G "Ninja Multi-Config"
          "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"
          "-DCMAKE_MT:FILEPATH=$env:CMAKE_MT"

      # The CMake desktop_ui target bundles the Preact frontend (deno) and
      # compiles the Tauri UI (cargo) into <recorder-output>/ui/Monolith.UI.exe.
      - name: Build Release
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Install Stream Deck plugin dependencies
        shell: pwsh
        working-directory: plugins/stream-deck
        run: npm ci

      - name: Build Stream Deck plugin package
        shell: pwsh
        working-directory: plugins/stream-deck
        run: .\scripts\package-plugin.ps1

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path "build/app/recorder/Release/Monolith.exe")) {
            Write-Error "Build output not found: build/app/recorder/Release/Monolith.exe"
            exit 1
          }
          if (-not (Test-Path "build/app/recorder/Release/ui/Monolith.UI.exe")) {
            Write-Error "Build output not found: build/app/recorder/Release/ui/Monolith.UI.exe"
            exit 1
          }
          $plugin = Get-ChildItem "plugins/stream-deck/dist/*.streamDeckPlugin" -ErrorAction SilentlyContinue
          if (-not $plugin) {
            Write-Error "Stream Deck package not found under plugins/stream-deck/dist"
            exit 1
          }

      - name: Upload release folder
        uses: actions/upload-artifact@v4
        with:
          name: monolith-windows-release
          path: |
            build/app/recorder/Release/**
            plugins/stream-deck/dist/*.streamDeckPlugin
          if-no-files-found: error
