<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

         config allows them — see docs/DECISIONS.md ADR-0015. -->

    <link rel="stylesheet" href="/styles.css" />
  </head>

    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
