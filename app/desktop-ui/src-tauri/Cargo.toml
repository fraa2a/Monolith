[package]
name = "monolith-ui"
version = "1.0.0"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2" }

[dependencies]
tauri = { version = "2" }
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Local same-origin HTTP host: preserves the frontend's fetch()/media route
# contract (incl. <video> Range seeking) so the Preact UI is unchanged. See ADR-0011.
tiny_http = "0.12"
include_dir = "0.7"
url = "2"
percent-encoding = "2"
base64 = "0.22"
ureq = { version = "2", features = ["json"] }
# Native Windows folder picker for directory settings (no manual path entry).
# xdg-portal is Linux-only; on Windows this pulls the Win32 IFileDialog backend.
rfd = "0.15"

[[bin]]
name = "monolith_ui"
path = "src/main.rs"

# The desktop UI is a foreground, human-driven window; optimize the release build
# for size over raw throughput to keep the shipped exe small.
[profile.release]
opt-level = "s"
lto = true
strip = true
